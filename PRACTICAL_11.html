<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Finished Practical 11 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical 11 - HTML5 APIs</title>
    <style>
        body {
            background-color: lightcyan;
            font-family: "Arial", sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border: 3px solid #000;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            border-radius: 15px;
        }

        h1 {
            color: darkblue;
            text-decoration: underline;
        }

        h3 {
            color: maroon;
            background-color: #ffffcc;
            display: inline-block;
            padding: 5px;
        }

        #drag-box {
            width: 200px;
            height: 100px;
            border: 2px dashed red;
            background-color: #f0f0f0;
            margin: 10px auto;
            line-height: 100px;
        }

        #item {
            width: 60px;
            height: 60px;
            background-color: green;
            color: yellow;
            font-weight: bold;
            text-align: center;
            line-height: 60px;
            margin: 10px auto;
            cursor: pointer;
        }

        button {
            background-color: orange;
            color: black;
            border: 2px solid brown;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: yellow;
        }

        input {
            padding: 10px;
            border: 2px solid blue;
        }

        footer {
            margin-top: 30px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Practical 11: HTML5 APIs</h1>

        <h3>1. Drag and Drop</h3>
        <div id="drag-box" ondrop="drop(event)" ondragover="allowDrop(event)">
            Drop here
        </div>
        <div id="item" draggable="true" ondragstart="drag(event)">Drag</div>

        <hr>

        <h3>2. Geolocation</h3>
        <p>Click the button below to see your latitude and longitude!</p>
        <button onclick="getLocation()">Get My Location</button>
        <p id="location-display"></p>

        <hr>

        <h3>3. Web Storage</h3>
        <p>Enter name to save in browser:</p>
        <input type="text" id="nameInput" placeholder="Type name...">
        <br><br>
        <button onclick="saveName()">Save My Name</button>
        <p id="storage-display"></p>
    </div>

    <script>
        // this function lets us drag items
        function allowDrop(ev) { ev.preventDefault(); }
        // this is for starting the drag
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        // this is for dropping the item
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            ev.target.appendChild(document.getElementById(data));
        }

        // Geolocation
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                document.getElementById("location-display").innerHTML = "Geolocation not supported.";
            }
        }
        function showPosition(position) {
            document.getElementById("location-display").innerHTML =
                "Latitude: " + position.coords.latitude + "<br>Longitude: " + position.coords.longitude;
        }

        // Web Storage
        function saveName() {
            var name = document.getElementById("nameInput").value;
            localStorage.setItem("username", name);
            displayStorage();
        }
        function displayStorage() {
            var name = localStorage.getItem("username");
            if (name) {
                document.getElementById("storage-display").innerHTML = "Welcome back, " + name + "!";
            }
        }
        displayStorage();
    </script>
    <hr>
    <footer>
        <p>End of Practical 11 - Atharva Jadhav</p>
    </footer>
</body>

</html>
